

set -g extended-keys on
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:Tc"
set -ag terminal-overrides ',*:cud1=\E[1B'

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
unbind C-,
set -g prefix C-t
bind-key C-t send-prefix

bind-key q run-shell -b "/home/ysong/.config/tmux/scripts/confirm-kill-pane-popup.sh '#{pane_id}'"
bind-key Q run-shell -b "/home/ysong/.config/tmux/scripts/confirm-kill-session-popup.sh '#{session_name}'"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

set -g status-position top
set -g status-style "bg=#202225,fg=#cdd6f4"
set -g status-justify left
set -g message-style "bg=#202225,fg=#f9e2af"
set -g message-command-style "bg=#202225,fg=#f9e2af"
set -g status-left-length 120
set -g status-left "#{prefix_highlight}[#S] "
set -g status-right "#(/home/ysong/.config/tmux/scripts/im-status.sh)#[fg=#fab387] %H:%M#[default] "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa] #I:#W #[default]#[fg=#f9e2af]#{?#{==:#{client_prefix},1}, =>,}#[fg=#cdd6f4]#{?#{==:#{client_prefix},1}, | (S)ave | (R)estore | (l)ock | (z)oom | ([) scroll | (Q)uit |,}#[default] "
setw -g window-status-format "#[fg=#9399b2] #I:#W "
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89b4fa"


# -----------------------------------------------------------------------------
# LOCKED / ZOOM-LOCKED 配置
# -----------------------------------------------------------------------------

# Prefix + l: 进入普通锁定，Prefix + z: 进入或退出 ZOOM-LOCKED
unbind L
unbind l
unbind -T off b
unbind -T off C-t
unbind -T off-prefix L
unbind -T off-prefix z
unbind -T off-prefix l
unbind -T off-prefix Any
bind l \
    set-option prefix None \; \
    set-option key-table off \; \
    set-option status-style "bg=#202225,fg=#888888" \; \
    set-option status-left "#[fg=#ff5555,bold] 🔒 LOCKED #[fg=#a6adc8]C-t l to exit " \; \
    set-option pane-active-border-style "fg=#e5c07b" \; \
    if-shell -F "#{pane_in_mode}" "send-keys -X cancel" \; \
    refresh-client -S
bind z if-shell -F "#{window_zoomed_flag}" \
    "resize-pane -Z; set-option -u prefix; set-option -u key-table; set-option -u status-style; set-option -u status-left; set-option -u pane-active-border-style; refresh-client -S" \
    "resize-pane -Z; set-option prefix None; set-option key-table off; set-option status-style 'bg=#202225,fg=#888888'; set-option status-left '#[fg=#ff5555,bold] 🔒 ZOOM-LOCKED #[fg=#a6adc8]C-t z to exit '; set-option pane-active-border-style 'fg=#fab387'; if-shell -F '#{pane_in_mode}' 'send-keys -X cancel'; refresh-client -S"

# 在锁定状态下依然允许鼠标滚轮进入复制模式
bind -T off WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }

# 按 C-t 进入锁定前缀表，再用对应按键退出当前锁定状态
bind -T off C-t switch-client -T off-prefix
bind -T off-prefix z \
    if-shell -F "#{window_zoomed_flag}" \
    "set-option -u prefix; set-option -u key-table; set-option -u status-style; set-option -u status-left; set-option -u pane-active-border-style; resize-pane -Z; refresh-client -S" \
    "switch-client -T off"
bind -T off-prefix l \
    if-shell -F "#{window_zoomed_flag}" \
    "switch-client -T off" \
    "set-option -u prefix; set-option -u key-table; set-option -u status-style; set-option -u status-left; set-option -u pane-active-border-style; refresh-client -S"
bind -T off-prefix Any switch-client -T off

set -as terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_fg '#1E1E2E'
set -g @prefix_highlight_bg '#f9e2af'
set -g @prefix_highlight_prefix_prompt ' ≡ ' 
set -g @prefix_highlight_copy_prompt ' COPY '
set -g @prefix_highlight_output_prefix '#[bold]'
set -g @prefix_highlight_output_suffix '#[default] '
set -g @prefix_highlight_empty_prompt ''

# Change resurrect save key to avoid C-s flow control issues
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g status-interval 1

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
