

set -g extended-keys on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

set -ag terminal-overrides ',*:cud1=\E[1B'



set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
unbind C-,
set -g prefix C-t
bind-key C-t send-prefix

set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm-256color:Tc"

bind-key q confirm-before -p "杀掉面板 #P? (y/n)" kill-pane
bind-key Q confirm-before -p "杀掉整个会话? (y/n)" kill-session

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 120
set -g status-left "#{prefix_highlight}❐ Session: #S "
set -g status-right "#(/home/ysong/.config/tmux/scripts/im-status.sh)#[fg=#fab387,bold] %H:%M "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W #[default]#[fg=#f9e2af,bold]#{?#{==:#{client_prefix},1}, =>,}#[fg=#cdd6f4]#{?#{==:#{client_prefix},1}, S save | R restore | L lock | Q quit,}#[default] "
setw -g window-status-format "#[fg=#9399b2] #I:#W "
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89b4fa"


# -----------------------------------------------------------------------------
# ZOOM-LOCKED 配置
# -----------------------------------------------------------------------------

# Prefix + z: 进入或退出 ZOOM-LOCKED
unbind L
unbind -T off b
unbind -T off C-t
unbind -T off-prefix z
unbind -T off-prefix Any
bind z if-shell -F "#{window_zoomed_flag}" \
    "resize-pane -Z; set-option -u prefix; set-option -u key-table; set-option -u status-style; set-option -u status-left; refresh-client -S" \
    "resize-pane -Z; set-option prefix None; set-option key-table off; set-option status-style 'bg=#444444,fg=#888888'; set-option status-left '#[fg=#ff5555,bold] 🔒 ZOOM-LOCKED #[fg=#a6adc8]C-t z to exit '; if-shell -F '#{pane_in_mode}' 'send-keys -X cancel'; refresh-client -S"

# 在 ZOOM-LOCKED 状态下依然允许鼠标滚轮进入复制模式
bind -T off WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }

# 在 ZOOM-LOCKED 状态下，按 C-t 再按 z 退出，保持与进入动作对称
bind -T off C-t if-shell -F "#{window_zoomed_flag}" "switch-client -T off-prefix" ""
bind -T off-prefix z \
    set-option -u prefix \; \
    set-option -u key-table \; \
    set-option -u status-style \; \
    set-option -u status-left \; \
    if-shell -F "#{window_zoomed_flag}" "resize-pane -Z" \; \
    refresh-client -S
bind -T off-prefix Any switch-client -T off

set -as terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_fg '#1e1e2e'
set -g @prefix_highlight_bg '#f9e2af'
set -g @prefix_highlight_prefix_prompt ' PREFIX '
set -g @prefix_highlight_copy_prompt ' COPY '
set -g @prefix_highlight_output_prefix '#[bold]'
set -g @prefix_highlight_output_suffix '#[default] '
set -g @prefix_highlight_empty_prompt ''

# Change resurrect save key to avoid C-s flow control issues
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g status-interval 1

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
